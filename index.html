}

}

function getRandomMember() {
    const isMale = Math.random() < 0.5;
    let name, avatarUrl;
    if(isMale) { name = maleNames[maleIndex % maleNames.length]; avatarUrl = maleAvatars[maleIndex % maleAvatars.length]; maleIndex++; }

}

    });
    allGroupsListElem.innerHTML = html;
}
function showRandomGroup() {
    const rand = Math.floor(Math.random() * allGroupsData.length);
    const group = allGroupsData[rand];
    widgetTitleElem.textContent = group.name.toUpperCase();
    groupContainerElem.innerHTML = `<div class="group-card"><a href="${group.link}" target="_blank"><div style="display:flex;height:150px;justify-content:center;overflow:hidden"><img src="${group.img}" style="width:100%;height:100%;object-fit:cover"></div></a><div class="loading-bar-container"><div class="loading-bar"></div></div></div><a class="join-button" href="${group.link}" target="_blank">VÀO NHÓM</a>`;
    const bar = document.querySelector('.loading-bar');
    if(bar) { bar.style.animation = 'none'; bar.offsetHeight; bar.style.animation = `countdown ${RELOAD_INTERVAL}s linear`; }
}
function showMemberNotification() {
    memberNotificationElem.classList.remove('show');
    setTimeout(() => {
        const member = getRandomMember();
        const action = randomActions[Math.floor(Math.random() * randomActions.length)];
        memberNotificationElem.innerHTML = `<img src="${member.avatarUrl}" class="member-avatar"/> ${member.name} vừa nhắn tin: <span style="display:block;font-weight:bold;color:white;margin-top:3px;">${action}</span>`;

    }, 500);
}
function initWidget() { showRandomGroup(); displayAllGroups(); showMemberNotification(); reloadTimer = setInterval(showRandomGroup, RELOAD_INTERVAL * 1000); memberTimer = setInterval(showMemberNotification, MEMBER_CHANGE_INTERVAL * 1000); }
